name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer/Applications
        # 或使用最新：Xcode_16.0、Xcode_15.2 等，取决于 GitHub 提供的版本

      - name: Build Swift Package
        run: |
           xcodebuild build \
              -scheme MNSwiftKit \
              -destination 'generic/platform=iOS Simulator' \
              -configuration Debug

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Pod Install
        working-directory: Example
        run: pod install

      - name: Build Example
        run: |
          xcodebuild build-for-testing \
            -workspace Example/MNSwiftKit_Example.xcworkspace \
            -scheme MNSwiftKit_Example \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Run Tests
        run: |
          xcodebuild test-without-building \
            -workspace Example/MNSwiftKit_Example.xcworkspace \
            -scheme MNSwiftKit_Example \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -configuration Debug \
            -only-testing:MNSwiftKit_Tests \
            CODE_SIGNING_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Pod Lib Lint
      run: pod lib lint MNSwiftKit.podspec --allow-warnings
